<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stand-In Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #09111d;
            --surface: #101b2b;
            --surface-soft: #162338;
            --line: rgba(255, 255, 255, 0.08);
            --text: #ecf7ff;
            --muted: #9bb0ca;
            --cyan: #43e4de;
            --pink: #ff5b8b;
        }

        body {
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(circle at 15% 20%, rgba(67, 228, 222, 0.12), transparent 22%),
                radial-gradient(circle at 82% 12%, rgba(255, 91, 139, 0.11), transparent 24%),
                linear-gradient(180deg, var(--bg), #0f1b2c);
            color: var(--text);
        }

        .chat-header {
            background: rgba(5, 11, 22, 0.88);
            color: white;
            padding: 16px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--line);
            backdrop-filter: blur(16px);
        }

        .chat-title {
            font-size: 18px;
            font-weight: 700;
        }

        .chat-status {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
        }

        .close-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px 12px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 12px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .message.own {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 38px;
            height: 38px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(67, 228, 222, 0.28), rgba(255, 91, 139, 0.22));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            flex-shrink: 0;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .message-avatar img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .message-content {
            max-width: 76%;
        }

        .message-name {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .message.own .message-name {
            text-align: right;
        }

        .message-bubble {
            background: rgba(255, 255, 255, 0.06);
            padding: 12px 14px;
            border-radius: 18px;
            border-top-left-radius: 8px;
            word-wrap: break-word;
            line-height: 1.5;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .message.own .message-bubble {
            background: linear-gradient(135deg, rgba(67, 228, 222, 0.95), rgba(255, 91, 139, 0.88));
            color: #07111f;
            border-top-left-radius: 18px;
            border-top-right-radius: 8px;
        }

        .message-time {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
            text-align: right;
        }

        .message.own .message-time {
            text-align: left;
        }

        .chat-input {
            background: rgba(6, 12, 23, 0.9);
            padding: 18px;
            border-top: 1px solid var(--line);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 22px;
            outline: none;
            font-size: 14px;
            resize: none;
            max-height: 100px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
        }

        .message-input:focus {
            border-color: rgba(67, 228, 222, 0.42);
            box-shadow: 0 0 0 4px rgba(67, 228, 222, 0.1);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--cyan), #6cf0c7);
            color: #07111f;
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 900;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            display: none;
            padding: 10px 20px;
            font-style: italic;
            color: var(--muted);
            font-size: 14px;
        }

        .typing-dots {
            display: inline-block;
        }

        .typing-dots span {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--cyan);
            margin: 0 1px;
            animation: typing 1.4s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .connection-status {
            padding: 8px 20px;
            background: rgba(67, 228, 222, 0.1);
            color: #c8fffa;
            font-size: 12px;
            text-align: center;
            display: none;
        }

        .connection-status.disconnected {
            background: rgba(255, 91, 139, 0.12);
            color: #ffd5e0;
            display: block;
        }

        .connection-status.connected {
            display: block;
        }

        .empty-chat {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .empty-chat h3 {
            margin-bottom: 10px;
            color: var(--text);
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <div>
            <div class="chat-title" id="chatTitle">Request Chat</div>
            <div class="chat-status" id="chatStatus">Connecting...</div>
        </div>
        <button class="close-btn" onclick="window.close()">Close</button>
    </div>

    <div class="connection-status" id="connectionStatus">
        Connecting to chat...
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="empty-chat">
            <h3>Start the conversation</h3>
            <p>Saved messages from this request will appear here for both the client and provider.</p>
        </div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
        <span id="typingUser">Someone</span> is typing
        <div class="typing-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div class="chat-input">
        <textarea
            class="message-input"
            id="messageInput"
            placeholder="Type your message..."
            rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">&gt;</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;
        let currentUser = null;
        let roomId = null;
        let typingTimeout = null;
        let isTyping = false;
        let pollInterval = null;
        const knownMessageIds = new Set();

        document.addEventListener('DOMContentLoaded', function () {
            initializeChat();
        });

        async function initializeChat() {
            const urlParams = new URLSearchParams(window.location.search);
            roomId = urlParams.get('room');

            if (!roomId) {
                alert('Invalid chat room');
                window.close();
                return;
            }

            const user = localStorage.getItem('user');
            if (!user) {
                alert('Please login first');
                window.close();
                return;
            }

            currentUser = JSON.parse(user);
            socket = io();

            socket.on('connect', function () {
                updateConnectionStatus(true);
                joinRoom();
            });

            socket.on('disconnect', function () {
                updateConnectionStatus(false);
            });

            socket.on('receive-message', function (data) {
                if (data.roomId && data.roomId !== roomId) {
                    return;
                }

                displayMessage(data);
            });

            socket.on('user-typing', function (data) {
                if (String(data.userId) !== String(currentUser.id || currentUser._id)) {
                    showTypingIndicator(data.userName);
                }
            });

            socket.on('user-stopped-typing', function (data) {
                if (String(data.userId) !== String(currentUser.id || currentUser._id)) {
                    hideTypingIndicator();
                }
            });

            const messageInput = document.getElementById('messageInput');
            messageInput.addEventListener('keydown', function (event) {
                if (event.key === 'Enter' && !event.shiftKey) {
                    event.preventDefault();
                    sendMessage();
                } else {
                    handleTyping();
                }
            });

            messageInput.addEventListener('input', function () {
                autoResize(this);
                handleTyping();
            });

            await loadChatHistory();
            pollInterval = window.setInterval(loadChatHistory, 5000);
        }

        function joinRoom() {
            socket.emit('join-room', roomId);
            document.getElementById('chatStatus').textContent = 'Live updates connected';
        }

        async function loadChatHistory() {
            try {
                const response = await fetch(`/api/requests/chat/${encodeURIComponent(roomId)}`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });

                if (!response.ok) {
                    return;
                }

                const data = await response.json();
                document.getElementById('chatTitle').textContent = data.title || 'Request Chat';
                document.getElementById('chatStatus').textContent = `Status: ${capitalizeWords(data.status || 'active')}`;

                (data.messages || []).forEach(function (message) {
                    displayMessage({
                        _id: message._id,
                        roomId: roomId,
                        userId: message.userId || message.sender,
                        userName: message.userName,
                        userRole: message.userRole,
                        userImage: message.userImage,
                        message: message.message,
                        timestamp: message.timestamp
                    });
                });
            } catch (error) {
                console.error('Error loading chat history:', error);
            }
        }

        function updateConnectionStatus(connected) {
            const statusEl = document.getElementById('connectionStatus');

            if (connected) {
                statusEl.textContent = 'Connected to live chat updates';
                statusEl.className = 'connection-status connected';
                setTimeout(function () {
                    statusEl.style.display = 'none';
                }, 2000);
            } else {
                statusEl.textContent = 'Live chat disconnected. Saved messages will keep syncing automatically.';
                statusEl.className = 'connection-status disconnected';
            }
        }

        async function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();

            if (!message) {
                return;
            }

            try {
                const response = await fetch(`/api/requests/chat/${encodeURIComponent(roomId)}/messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ message: message })
                });

                const result = await response.json();
                if (!response.ok) {
                    alert(result.message || 'Unable to send message right now.');
                    return;
                }

                displayMessage(result);
                messageInput.value = '';
                autoResize(messageInput);
                stopTyping();
            } catch (error) {
                alert('Network error. Please try again.');
            }
        }

        function displayMessage(data) {
            const messagesContainer = document.getElementById('chatMessages');
            const messageId = String(data._id || `${data.userId}-${data.timestamp}-${data.message}`);

            if (knownMessageIds.has(messageId)) {
                return;
            }

            knownMessageIds.add(messageId);

            const isOwn = String(data.userId) === String(currentUser.id || currentUser._id);
            const messageEl = document.createElement('div');
            const emptyChat = document.querySelector('.empty-chat');

            if (emptyChat) {
                emptyChat.remove();
            }

            messageEl.className = `message ${isOwn ? 'own' : ''}`;

            const time = new Date(data.timestamp).toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit'
            });

            messageEl.innerHTML = `
                <div class="message-avatar">${data.userImage ? `<img src="${escapeHtml(data.userImage)}" alt="${escapeHtml(data.userName || 'User')}">` : escapeHtml(getInitial(data.userName))}</div>
                <div class="message-content">
                    <div class="message-name">${escapeHtml(data.userName || 'Stand-In user')}</div>
                    <div class="message-bubble">${escapeHtml(data.message)}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;

            messagesContainer.appendChild(messageEl);
            scrollToBottom();
        }

        function handleTyping() {
            if (!socket) {
                return;
            }

            if (!isTyping) {
                isTyping = true;
                socket.emit('user-typing', {
                    roomId: roomId,
                    userId: currentUser.id || currentUser._id,
                    userName: currentUser.name
                });
            }

            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(function () {
                stopTyping();
            }, 1000);
        }

        function stopTyping() {
            if (isTyping && socket) {
                isTyping = false;
                socket.emit('user-stopped-typing', {
                    roomId: roomId,
                    userId: currentUser.id || currentUser._id,
                    userName: currentUser.name
                });
            }
        }

        function showTypingIndicator(userName) {
            const indicator = document.getElementById('typingIndicator');
            document.getElementById('typingUser').textContent = userName;
            indicator.style.display = 'block';
            scrollToBottom();
        }

        function hideTypingIndicator() {
            document.getElementById('typingIndicator').style.display = 'none';
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
        }

        function scrollToBottom() {
            const messagesContainer = document.getElementById('chatMessages');
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        function getInitial(name) {
            return String(name || '?').trim().charAt(0).toUpperCase() || '?';
        }

        function capitalizeWords(value) {
            return String(value || '')
                .replace(/-/g, ' ')
                .replace(/\b\w/g, function (char) {
                    return char.toUpperCase();
                });
        }

        window.addEventListener('beforeunload', function () {
            if (pollInterval) {
                clearInterval(pollInterval);
            }

            if (socket) {
                stopTyping();
                socket.disconnect();
            }
        });
    </script>
</body>
</html>
